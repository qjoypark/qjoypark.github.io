<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Blog Post - Da Huo</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .blog-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .blog-meta {
            margin-bottom: 1.5rem;
        }

        .blog-meta h1 {
            margin-bottom: 0.25rem;
        }

        .blog-date {
            font-style: italic;
            color: #6b7280;
        }

        .blog-summary {
            margin-top: 0.75rem;
            font-weight: 600;
            color: #374151;
        }

        .blog-content h1 {
            font-size: 1.75rem;
        }

        .blog-content h2 {
            font-size: 1.5rem;
        }

        .blog-error {
            color: #b91c1c;
        }

        .blog-back {
            display: inline-block;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Da Huo's Blog</h1>
            <p>Insights and Updates on Microbial Ecology</p>
        </div>
    </header>
    <nav>
        <div class="container">
            <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
            <ul id="menu" class="menu">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#about">About Me</a></li>
                <li><a href="index.html#research">Research</a></li>
                <li><a href="index.html#publications">Publications</a></li>
                <li><a href="index.html#project">Project</a></li>
                <li><a href="index.html#students">Supervision</a></li>
                <li><a href="index.html#academic-identity">Academic Identity</a></li>
                <li><a href="index.html#academic-conference">Conference</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="blog.html">Blog</a></li>
            </ul>
        </div>
    </nav>
    <div class="blog-container">
        <article id="blog-article" aria-live="polite">
            <div class="blog-meta">
                <h1 id="blog-title">Loading post…</h1>
                <p id="blog-date" class="blog-date"></p>
                <p id="blog-summary" class="blog-summary"></p>
            </div>
            <div id="blog-content" class="blog-content"></div>
            <p id="blog-error" class="blog-error" role="alert" style="display:none;"></p>
            <a class="blog-back" href="blog.html">← Back to Blog</a>
        </article>
    </div>
    <footer>
        <p>&copy; 2024 Da Huo. All rights reserved.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script/script.js"></script>
</body>
</html>
